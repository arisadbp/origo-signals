<!DOCTYPE html>
<html lang="th">
<head>

<title>Global Market Dashboard</title>

<style>
body{background:#121212;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:#fff}
.fade-in-up{opacity:0;transform:translateY(20px);animation:fadeInUp .6s ease-out forwards}
.pulse-dot-map{transform-origin:center;animation:pulseGlowMap 2s infinite alternate}
.zoom-out-piece{display:inline-block;opacity:0;animation:zoomOutReveal .5s cubic-bezier(.25,1,.5,1) forwards}
.data-point,.map-dot-container{transition:opacity .3s ease-in-out}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlowMap{
0%{transform:scale(.8);opacity:.6;filter:drop-shadow(0 0 2px #f59e0b)}
100%{transform:scale(1.3);opacity:1;filter:drop-shadow(0 0 8px #f59e0b)}
}
@keyframes zoomOutReveal{
0%{transform:scale(1.8);opacity:0;filter:blur(4px)}
100%{transform:scale(1);opacity:1;filter:blur(0)}
}
</style>
</head>

<div class="grid grid-cols-3 gap-6">

<span class="text-[40px] font-bold text-[#f59e0b] leading-none" id="val-origin">0</span>
<span class="text-[13px] mt-3 leading-tight tracking-wide"><span class="text-gray-400">Top3:</span> <span class="text-gray-200 ml-1">China United States India</span></span>
</div>

<span class="text-[40px] font-bold text-[#f59e0b] leading-none" id="val-dest">0</span>
</div>

<span class="text-[40px] font-bold text-[#f59e0b] leading-none" id="val-cust">0</span>
</div>

</div>

<script>
const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));

function animateValue(id,targetValue,duration){
const obj=document.getElementById(id);
const startValue=parseInt(obj.innerText)||0;
const range=targetValue-startValue;
if(!range)return;
let startTime=null;
function step(currentTime){
if(!startTime)startTime=currentTime;
const progress=Math.min((currentTime-startTime)/duration,1);
obj.innerText=Math.floor(startValue+(progress*range));
if(progress<1)requestAnimationFrame(step);else obj.innerText=targetValue;
}
requestAnimationFrame(step);
}

async function playTimeline(){
const sweepRect=document.getElementById('sweepRect');
const dataPoints=document.querySelectorAll('.data-point');
const mapDots=document.querySelectorAll('.map-dot-container');

sweepRect.style.transform='scaleX(0)';
dataPoints.forEach(p=>p.classList.replace('opacity-100','opacity-0'));
mapDots.forEach(d=>d.classList.replace('opacity-100','opacity-0'));
document.getElementById('val-origin').innerText='0';
document.getElementById('val-dest').innerText='0';
document.getElementById('val-cust').innerText='0';

await sleep(400);

const stages=[
{scale:.15,origin:10,dest:4,cust:42,dots:[0,1],delay:450},
{scale:.30,origin:18,dest:9,cust:115,dots:[2],delay:450},
{scale:.40,origin:22,dest:14,cust:160,dots:[3],delay:450},
{scale:.75,origin:34,dest:21,cust:235,dots:[4,5],delay:550},
{scale:1,origin:41,dest:26,cust:274,dots:[6],delay:450}
];

for(let i=0;i<stages.length;i++){
const stage=stages[i];
sweepRect.style.transform=`scaleX(${stage.scale})`;
animateValue('val-origin',stage.origin,350);
animateValue('val-dest',stage.dest,350);
animateValue('val-cust',stage.cust,350);
setTimeout(()=>{
if(dataPoints[i])dataPoints[i].classList.replace('opacity-0','opacity-100');
stage.dots.forEach(dotIdx=>{if(mapDots[dotIdx])mapDots[dotIdx].classList.replace('opacity-0','opacity-100')});
},150);
await sleep(stage.delay);
}
}

document.addEventListener('DOMContentLoaded',playTimeline);
</script>
