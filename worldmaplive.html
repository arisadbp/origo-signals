<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIGO - Global Intelligence Globe</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Kanit', sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #F5B041;
            font-size: 1.2rem;
            letter-spacing: 2px;
            z-index: 20;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(245, 176, 65, 0.3);
            border-radius: 50%;
            border-top-color: #F5B041;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    กำลังประมวลผลเครือข่ายระดับโลก...
</div>

<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050505, 0.002);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 250;
camera.position.y = 50;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.minDistance = 150;
controls.maxDistance = 400;

const globeGroup = new THREE.Group();
scene.add(globeGroup);

const globeRadius = 100;
const sphereGeo = new THREE.SphereGeometry(globeRadius, 64, 64);
const sphereMat = new THREE.MeshPhongMaterial({
    color: 0x0a0a0a,
    emissive: 0x000000,
    specular: 0x111111,
    shininess: 5,
    transparent: true,
    opacity: 0.95
});
const innerGlobe = new THREE.Mesh(sphereGeo, sphereMat);
globeGroup.add(innerGlobe);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
directionalLight.position.set(1, 1, 1).normalize();
scene.add(directionalLight);

function createCircleTexture(color, size) {
    const matCanvas = document.createElement('canvas');
    matCanvas.width = size;
    matCanvas.height = size;
    const ctx = matCanvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, size / 2, 0, 2 * Math.PI, false);
    ctx.fillStyle = color;
    ctx.fill();
    const texture = new THREE.Texture(matCanvas);
    texture.needsUpdate = true;
    return texture;
}

function latLonToVector3(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    const x = -(radius * Math.sin(phi) * Math.cos(theta));
    const z = (radius * Math.sin(phi) * Math.sin(theta));
    const y = (radius * Math.cos(phi));
    return new THREE.Vector3(x, y, z);
}

const img = new Image();
img.crossOrigin = 'Anonymous';
img.src = 'https://unpkg.com/three-globe/example/img/earth-water.png';

img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    const dotPositions = [];
    const step = 3;

    for (let y = 0; y < canvas.height; y += step) {
        for (let x = 0; x < canvas.width; x += step) {
            const idx = (y * canvas.width + x) * 4;
            const r = imgData[idx];

            if (r < 100) {
                const lat = 90 - (y / canvas.height) * 180;
                const lon = (x / canvas.width) * 360 - 180;
                const pos = latLonToVector3(lat, lon, globeRadius + 0.5);
                dotPositions.push(pos.x, pos.y, pos.z);
            }
        }
    }

    const dotsGeometry = new THREE.BufferGeometry();
    dotsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(dotPositions, 3));

    const dotsMaterial = new THREE.PointsMaterial({
        size: 1.0,
        color: 0xbbbbbb,
        transparent: true,
        opacity: 0.8,
        map: createCircleTexture('#ffffff', 32),
        alphaTest: 0.1
    });

    const globeDots = new THREE.Points(dotsGeometry, dotsMaterial);
    globeGroup.add(globeDots);

    const loadingScreen = document.getElementById('loading');
    loadingScreen.style.opacity = '0';
    setTimeout(() => loadingScreen.style.display = 'none', 500);
};

img.onerror = () => {
    document.getElementById('loading').innerText = "โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้าจอ";
};

window.addEventListener('resize', onWindowResize, false);
function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    globeGroup.rotation.y += 0.0015;
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
